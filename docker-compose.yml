version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: loyalty_gold_postgres
    environment:
      POSTGRES_USER: loyalty
      POSTGRES_PASSWORD: password
      POSTGRES_DB: loyalty_gold
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
